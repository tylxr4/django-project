<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }
        .container { width: 100%; max-width: 400px; }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 40px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 15px; margin-bottom: 20px; outline: none; }
        button { width: 100%; background: #ffffff; color: #000; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:hover { background: #e0e0e0; }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
        .login-link a { color: #fff; text-decoration: none; }
        ul { color: #ff6b6b; font-size: 13px; margin-bottom: 16px; padding-left: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <p class="subtitle">Sign up to track your guitar practice.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
        <p class="login-link">Already have an account? <a href="/login">Log in</a></p>
    </div>
</body>
</html>
