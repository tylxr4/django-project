<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }
        .container { width: 100%; max-width: 400px; }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 40px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 15px; margin-bottom: 20px; outline: none; }
        button { width: 100%; background: #ffffff; color: #000; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:hover { background: #e0e0e0; }
        .register-link { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
        .register-link a { color: #fff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to your account.</p>
        <form method="POST">
            {% csrf_token %}
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password">
            <button type="submit">Log In</button>
        </form>
        <p class="register-link">Don't have an account? <a href="/register">Sign up</a></p>
    </div>
</body>
</html>
